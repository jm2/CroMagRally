name: Full Compile Check

# Run automatically on pull requests and pushes to master so compile breakage is caught
# in CI (Linux GCC/Clang, Windows VS2022, macOS), plus manual dispatch for ad-hoc checks.
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]

jobs:
  full-compile-check:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Linux/GCC, os: ubuntu-latest }
          - { name: Linux/Clang, os: ubuntu-latest, prefix: "CC=clang CXX=clang++"}
          - { name: Windows/VS2022, os: windows-2022, extraflags: "-G 'Visual Studio 17 2022'" }
          - { name: Mac, os: macos-latest }

    steps:
      # Linux jobs compile the pinned extern/SDL3 submodule. These are its optional
      # backend dependencies, matching the release AppImage job.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y libasound2-dev libpulse-dev \
            libaudio-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev fcitx-libs-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: {submodules: 'recursive'}

      - run: ${{matrix.platform.prefix}} python3 build.py --dependencies --configure --build ${{matrix.platform.extraflags}}

      - name: Run validation tests (Linux)
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure

      - name: Run validation tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Run validation tests (macOS)
        if: runner.os == 'macOS'
        run: ctest --test-dir build --build-config RelWithDebInfo --output-on-failure

      - name: Configure sanitizer validation tests
        if: matrix.platform.name == 'Linux/GCC'
        run: cmake -S . -B build-sanitize -DCMAKE_BUILD_TYPE=Debug -DBUILD_SDL_FROM_SOURCE=ON -DSANITIZE=ON

      - name: Run sanitizer validation tests
        if: matrix.platform.name == 'Linux/GCC'
        run: |
          cmake --build build-sanitize --target CroMagRallyValidationTests PommeFileTests PommeIEEEExtendedTests --parallel 2
          ctest --test-dir build-sanitize --output-on-failure

  # The desktop matrix above can't catch breakage in the Android NDK build or the mobile
  # branches of the shared CMakeLists, which otherwise only surface at release-tag time.
  # Build one ABI and assemble the debug APK so JNI staging, SDL Java glue, resources,
  # manifest merging, and Gradle packaging are all exercised on every PR.
  android-native-check:
    name: Android APK (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: {submodules: 'recursive'}   # extern/Pomme + extern/SDL3 + extern/gl4es

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SDK platform, build-tools and NDK
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;37.0.0" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Build Android debug APK
        env:
          ABIS: arm64-v8a
          GRADLE_TASK: assembleDebug
        run: ./build_android.sh

      - name: Lint Android package
        run: ./gradlew lintDebug
        working-directory: AndroidBuild
